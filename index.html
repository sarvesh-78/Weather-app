<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&family=DynaPuff:wght@400..700&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
    <div class="bg-video">
        <video autoplay muted loop class="video-bg">
            <source src="./images/sunny.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h1 class="Main">Weather App</h1>
        <div class="Container">
            <form class="weatherForm">
                <input type="text" id="city" class="cityInp" placeholder="Enter a city" />
                <button class="inpButton">Get Weather</button>
            </form>

            <div class="card" style="display: none;">
            </div>
        </div>
    </div>

    <div class="forecast">
        <br>
        <br>
    </div>

    <div id="weather-map">
        <div class="cloud-layer"></div>
    </div>
    <script src="./index.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.tilelayer-forecast"></script>
</body>

</html>
